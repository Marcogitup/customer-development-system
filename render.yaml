databases:
  - name: customer-dev-db
    databaseName: customer_dev
    user: customer_dev
    plan: free

services:
  - type: keyvalue
    name: customer-dev-redis
    plan: free
    ipAllowList: []

  - type: web
    name: customer-dev-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: customer-dev-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: customer-dev-redis
          property: connectionString
      - key: ENVIRONMENT
        value: production
      - key: SEARCH_PROVIDER
        value: demo
      - key: CRAWL_USER_AGENT
        value: CustomerDevelopmentBot/0.1 (+contact@example.com)
      - key: FRONTEND_ORIGIN
        value: https://customer-dev-web.onrender.com

  - type: web
    name: customer-dev-web
    runtime: node
    rootDir: frontend
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start -- --port $PORT
    envVars:
      - key: NEXT_PUBLIC_API_BASE_URL
        value: https://customer-dev-api.onrender.com
